# Tag Release on Label
#
# Cuts a release by LABEL instead of a manual tag push. When a PR carrying the
# `release` label is MERGED to main, this workflow tags `v<VERSION>` (read from
# the VERSION file) on the merge commit and pushes it. That tag push is what
# triggers the GoReleaser build in release.yml — this workflow only creates the
# tag, it does not run GoReleaser itself.
#
#   label a PR `release`  ──(merge)──►  tag v<VERSION>  ──►  release.yml (GoReleaser)
#
# Manual `git push origin vX.Y.Z` still works as a fallback (release.yml keeps
# its `push: tags` trigger).
#
# REQUIRED secret: RELEASE_TAG_TOKEN — a PAT (or GitHub App token) with
# `contents:write` on this repo. A tag pushed with the default GITHUB_TOKEN does
# NOT trigger other workflows (GitHub's recursion guard), so release.yml would
# never fire. The token below falls back to HOMEBREW_TAP_TOKEN, then GITHUB_TOKEN;
# only the first two (real PATs) will actually trigger the release build.
name: Tag Release on Label

on:
  pull_request:
    types: [labeled, closed]

permissions:
  contents: write

jobs:
  tag:
    name: Tag on release label
    runs-on: ubuntu-latest
    # Fire only when the PR is MERGED and carries the `release` label. This
    # covers both orderings: label-then-merge (fires on `closed`) and
    # merge-then-label (fires on `labeled`). Never tags un-merged code.
    if: >-
      github.event.pull_request.merged == true &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'release') ||
        (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'release'))
      )
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Use a PAT so the tag push triggers release.yml (see header note).
          token: ${{ secrets.RELEASE_TAG_TOKEN || secrets.HOMEBREW_TAP_TOKEN || github.token }}

      - name: Create and push version tag
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "${VERSION}" ]; then
            echo "::error::VERSION file is empty"; exit 1
          fi
          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::notice::Tag ${TAG} already exists on origin — skipping (no double release)."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} (PR #${{ github.event.pull_request.number }})"
          git push origin "${TAG}"
          echo "::notice::Pushed ${TAG} — triggers the GoReleaser release workflow."
