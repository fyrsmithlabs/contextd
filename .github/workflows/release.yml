# Release workflow
#
# On a `v*` tag, GoReleaser builds CGO binaries (contextd + ctxd) for all six
# targets (windows/darwin/linux x amd64/arm64) by cross-compiling from this
# single Linux runner with zig as the C/C++ toolchain. Each archive bundles the
# matching onnxruntime shared library next to the binary so local FastEmbed
# embeddings work offline with zero setup. GoReleaser also generates and
# publishes the Homebrew formula to fyrsmithlabs/homebrew-tap.
#
# REQUIRED secret: HOMEBREW_TAP_TOKEN - a PAT with `contents:write` on
# fyrsmithlabs/homebrew-tap. Without it the brews step fails.
#
# Trigger: a `v*` tag push. The normal path is to label a PR `release` and merge
# it - tag-release.yml then creates the tag for you. Pushing a `v*` tag by hand
# is the manual fallback and runs this same workflow.
name: Release

on:
  # Manual fallback: pushing a `v*` tag by hand releases that tag.
  push:
    tags:
      - 'v*'
  # Label path: tag-release.yml creates the tag and dispatches this workflow
  # against it (dispatch works with the default GITHUB_TOKEN; a tag push does
  # not). Dispatch with `--ref vX.Y.Z` so the checkout + GoReleaser see the tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: true

      # zig is the cross C/C++ toolchain for all targets. 0.14.0 is required:
      # 0.13's Mach-O linker cannot link Go-generated darwin objects.
      - name: Set up zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      # The Go module cache must be writable: zig writes a stray default object
      # into the compiler cwd (the module dir) during cgo preprocessor probes.
      - name: Make module cache writable
        run: |
          go env GOMODCACHE
          mkdir -p "$(go env GOMODCACHE)"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pinned: the `brews` block is deprecated in favour of homebrew_casks.
          # Pin to a known-good v2 so a future minor that removes `brews` cannot
          # silently break the release. Migrate to homebrew_casks before bumping.
          version: 'v2.16.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          CGO_ENABLED: '1'
          # Keep the Go module cache writable so zig's cgo probes can write into it.
          GOFLAGS: '-modcacherw'
          # Absolute repo root for the zig CC/CXX wrappers + macOS SDK referenced
          # in .goreleaser.yaml (envOrDefault "REPO_ROOT" .Env.PWD). Pin it to the
          # checkout root so the build never depends on PWD being set in the
          # goreleaser-action process env.
          REPO_ROOT: ${{ github.workspace }}
